<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MOUSE</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1c2c;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    canvas { display: block; }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <script>
  // ============================================================
  // 1. CONSTANTS
  // ============================================================
  const COLORS = {
    bg: '#1a1c2c', grid: '#262b44', mouseHead: '#9e9e9e', mouseBody: '#b0b0b0',
    cheese: '#f4b41a', cheeseDark: '#c8900e', obstacle: '#5d275d', obstacleDark: '#3d1a3d',
    text: '#f0f0f0', gold: '#f4b41a', hud: '#141422', overlay: 'rgba(0,0,0,0.7)',
    particle: '#f4b41a', deathParticle: '#9e9e9e'
  };
  const HUD_HEIGHT = 40;
  const PREFERRED_CELL_SIZE = 20;
  const MIN_CELL_SIZE = 10;
  const MIN_GRID = 15;
  const SIMPLIFIED_THRESHOLD = 16;
  const BASE_TICK = 150;
  const MIN_TICK = 60;
  const TICK_DECREASE = 10;
  const CHEESE_PER_SPEED = 3;
  const CHEESE_PER_OBSTACLE = 5;
  const MAX_OBSTACLE_RATIO = 0.05;
  const INPUT_BUFFER_CAP = 3;
  const CHEESE_SPAWN_DIST = 2;
  const OBS_SPAWN_DIST = 3;
  const OBS_FORWARD_PATH = 3;
  const OBS_RETRIES = 10;
  const BFS_MIN_EMPTY = 10;
  const BFS_MIN_RATIO = 0.10;

  const DIR = {
    UP:    { x:  0, y: -1 },
    DOWN:  { x:  0, y:  1 },
    LEFT:  { x: -1, y:  0 },
    RIGHT: { x:  1, y:  0 }
  };
  const OPPOSITE = { UP: 'DOWN', DOWN: 'UP', LEFT: 'RIGHT', RIGHT: 'LEFT' };

  const KEY_MAP = {
    ArrowUp: 'UP', ArrowDown: 'DOWN', ArrowLeft: 'LEFT', ArrowRight: 'RIGHT',
    KeyW: 'UP', KeyS: 'DOWN', KeyA: 'LEFT', KeyD: 'RIGHT'
  };

  // ============================================================
  // 2. STATE
  // ============================================================
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  let state = {
    screen: 'start',
    gridWidth: 0, gridHeight: 0, cellSize: 0,
    lockedCanvasWidth: 0, lockedCanvasHeight: 0,
    body: [], effectiveDirection: 'RIGHT', inputBuffer: [],
    cheese: null, obstacles: [],
    score: 0, cheeseEaten: 0, speedLevel: 1, tickInterval: BASE_TICK,
    pendingObstacles: 0, highScore: 0,
    musicEnabled: true, pauseMuted: false, resizeMuted: false,
    userPaused: false, resizeBlocked: false,
    growing: false, tickTimer: null,
    particles: [],
    audioCtx: null, audioInitialized: false, musicPlaying: false,
    musicNodes: null, blinkVisible: true, blinkTimer: null,
    collisionCell: null, isNewHighScore: false
  };

  // ============================================================
  // 3. UTILITY FUNCTIONS
  // ============================================================
  function wrap(v, max) { return ((v % max) + max) % max; }

  function chebyshevDist(a, b) {
    const dx = Math.min(Math.abs(a.x - b.x), state.gridWidth - Math.abs(a.x - b.x));
    const dy = Math.min(Math.abs(a.y - b.y), state.gridHeight - Math.abs(a.y - b.y));
    return Math.max(dx, dy);
  }

  function cellKey(x, y) { return x + ',' + y; }

  function getOccupiedSet() {
    const s = new Set();
    state.body.forEach(seg => s.add(cellKey(seg.x, seg.y)));
    state.obstacles.forEach(obs => s.add(cellKey(obs.x, obs.y)));
    if (state.cheese) s.add(cellKey(state.cheese.x, state.cheese.y));
    return s;
  }

  function getEmptyCells(occupied) {
    const cells = [];
    for (let x = 0; x < state.gridWidth; x++)
      for (let y = 0; y < state.gridHeight; y++)
        if (!occupied.has(cellKey(x, y))) cells.push({ x, y });
    return cells;
  }

  function randomItem(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  // ============================================================
  // 4. GRID & SIZING
  // ============================================================
  function computeGrid() {
    const w = window.innerWidth;
    const h = window.innerHeight;
    let cs = PREFERRED_CELL_SIZE;
    let cols = Math.floor(w / cs);
    let rows = Math.floor((h - HUD_HEIGHT) / cs);

    if (cols < MIN_GRID || rows < MIN_GRID) {
      cs = Math.floor(Math.min(w / MIN_GRID, (h - HUD_HEIGHT) / MIN_GRID));
      if (cs < MIN_CELL_SIZE) {
        state.screen = 'tooSmall';
        return false;
      }
      cols = Math.floor(w / cs);
      rows = Math.floor((h - HUD_HEIGHT) / cs);
    }
    state.gridWidth = cols;
    state.gridHeight = rows;
    state.cellSize = cs;
    return true;
  }

  function setupCanvas() {
    canvas.width = state.gridWidth * state.cellSize;
    canvas.height = state.gridHeight * state.cellSize + HUD_HEIGHT;
    canvas.style.position = 'absolute';
    centerCanvas();
  }

  function centerCanvas() {
    canvas.style.left = Math.max(0, (window.innerWidth - canvas.width) / 2) + 'px';
    canvas.style.top = Math.max(0, (window.innerHeight - canvas.height) / 2) + 'px';
  }

  function lockGrid() {
    state.lockedCanvasWidth = canvas.width;
    state.lockedCanvasHeight = canvas.height;
  }

  window.addEventListener('resize', () => {
    if (state.screen === 'start' || state.screen === 'tooSmall') {
      if (computeGrid()) {
        if (state.screen === 'tooSmall') state.screen = 'start';
        setupCanvas();
      }
      render();
    } else {
      // Game active — grid locked
      centerCanvas();
      const tooSmall = window.innerWidth < state.lockedCanvasWidth ||
                       window.innerHeight < state.lockedCanvasHeight;
      if (tooSmall && !state.resizeBlocked) {
        state.resizeBlocked = true;
        state.inputBuffer = [];
        clearTimeout(state.tickTimer);
        state.resizeMuted = true;
        stopMusic();
        render();
      } else if (!tooSmall && state.resizeBlocked) {
        state.resizeBlocked = false;
        state.resizeMuted = false;
        if (!state.pauseMuted && state.musicEnabled) startMusic();
        if (state.userPaused) {
          state.screen = 'paused';
        } else if (state.screen === 'playing' || state.screen === 'paused') {
          state.screen = 'playing';
          scheduleTick();
        }
        render();
      }
    }
  });

  // ============================================================
  // 5. INPUT
  // ============================================================
  document.addEventListener('keydown', (e) => {
    initAudio();

    const dir = KEY_MAP[e.code];

    // Direction input
    if (dir) {
      if (state.screen === 'playing' && !state.resizeBlocked) {
        if (state.inputBuffer.length < INPUT_BUFFER_CAP) {
          state.inputBuffer.push(dir);
        }
      }
      e.preventDefault();
      return;
    }

    switch (e.code) {
      case 'Space':
        if (state.screen === 'start') {
          playSFX('menu');
          startGame();
        } else if (state.screen === 'gameover' || state.screen === 'win') {
          playSFX('menu');
          resetAndStart();
        }
        e.preventDefault();
        break;

      case 'KeyP':
        if (state.screen === 'playing' && !state.resizeBlocked) {
          state.userPaused = true;
          state.pauseMuted = true;
          state.inputBuffer = [];
          stopMusic();
          clearTimeout(state.tickTimer);
          state.screen = 'paused';
          render();
        } else if (state.screen === 'paused' && !state.resizeBlocked) {
          state.userPaused = false;
          state.pauseMuted = false;
          if (state.musicEnabled) startMusic();
          state.screen = 'playing';
          scheduleTick();
          render();
        } else if (state.resizeBlocked) {
          // Toggle pause during resize-block
          state.userPaused = !state.userPaused;
          state.pauseMuted = state.userPaused;
        }
        break;

      case 'KeyM':
        if (state.screen === 'tooSmall' || state.resizeBlocked) break;
        playSFX('menu');
        state.musicEnabled = !state.musicEnabled;
        if (state.screen !== 'start') {
          if (state.musicEnabled && !state.pauseMuted && !state.resizeMuted) {
            startMusic();
          } else {
            stopMusic();
          }
        }
        render();
        break;
    }
  });

  document.addEventListener('click', () => { initAudio(); });

  // ============================================================
  // 6. GAME LOGIC
  // ============================================================
  function startGame() {
    lockGrid();
    initMouse();
    spawnCheese();
    state.screen = 'playing';
    state.score = 0;
    state.cheeseEaten = 0;
    state.speedLevel = 1;
    state.tickInterval = BASE_TICK;
    state.pendingObstacles = 0;
    state.obstacles = [];
    state.particles = [];
    state.collisionCell = null;
    state.isNewHighScore = false;
    if (state.musicEnabled) startMusic();
    scheduleTick();
    render();
  }

  function resetAndStart() {
    stopMusic();
    state.userPaused = false;
    state.pauseMuted = false;
    state.resizeBlocked = false;
    state.resizeMuted = false;
    startGame();
  }

  function initMouse() {
    const hx = Math.floor(state.gridWidth / 2);
    const hy = Math.floor(state.gridHeight / 2);
    state.body = [{ x: hx, y: hy }, { x: hx - 1, y: hy }, { x: hx - 2, y: hy }];
    state.effectiveDirection = 'RIGHT';
    state.inputBuffer = [];
    state.growing = false;
  }

  function processInput() {
    while (state.inputBuffer.length > 0) {
      const dir = state.inputBuffer.shift();
      if (dir === OPPOSITE[state.effectiveDirection]) continue;
      state.effectiveDirection = dir;
      break;
    }
  }

  function moveHead() {
    const head = state.body[0];
    const d = DIR[state.effectiveDirection];
    return {
      x: wrap(head.x + d.x, state.gridWidth),
      y: wrap(head.y + d.y, state.gridHeight)
    };
  }

  function tick() {
    // Step 1: Input
    processInput();
    // Step 2: Move
    const newHead = moveHead();
    // Step 3: Food check
    const growing = state.cheese && newHead.x === state.cheese.x && newHead.y === state.cheese.y;
    // Step 4: Tail removal
    if (!growing) state.body.pop();
    // Step 5: Collision
    const hitBody = state.body.some(s => s.x === newHead.x && s.y === newHead.y);
    const hitObs = state.obstacles.some(o => o.x === newHead.x && o.y === newHead.y);
    if (hitBody || hitObs) {
      state.collisionCell = { x: newHead.x, y: newHead.y };
      gameOver();
      return;
    }
    // Step 6: Apply head
    state.body.unshift(newHead);
    // Step 7: Post-eat
    if (growing) postEat();
    // Step 8: Render
    render();
    // Step 9: Schedule next tick
    if (state.screen === 'playing') scheduleTick();
  }

  function postEat() {
    state.cheeseEaten++;
    state.speedLevel = Math.floor(state.cheeseEaten / CHEESE_PER_SPEED) + 1;
    state.score += 10 * state.speedLevel;
    state.tickInterval = Math.max(MIN_TICK, BASE_TICK - Math.floor(state.cheeseEaten / CHEESE_PER_SPEED) * TICK_DECREASE);
    playSFX('eat');
    spawnParticles(state.cheese.x, state.cheese.y, 6, COLORS.particle, 'eat');

    // Spawn new cheese
    if (!spawnCheese()) {
      triggerWin();
      return;
    }

    // Obstacle resolution
    if (state.cheeseEaten % CHEESE_PER_OBSTACLE === 0) state.pendingObstacles++;
    if (state.pendingObstacles > 0) {
      const cap = Math.floor(state.gridWidth * state.gridHeight * MAX_OBSTACLE_RATIO);
      if (state.obstacles.length >= cap) {
        state.pendingObstacles = 0;
      } else if (tryPlaceObstacle()) {
        state.pendingObstacles--;
        playSFX('obstacle');
      }
    }
  }

  function spawnCheese() {
    const occupied = getOccupiedSet();
    const empty = getEmptyCells(occupied);
    if (empty.length === 0) return false;

    const head = state.body[0];
    const valid = empty.filter(c => chebyshevDist(c, head) >= CHEESE_SPAWN_DIST);
    state.cheese = valid.length > 0 ? randomItem(valid) : randomItem(empty);
    return true;
  }

  function getForwardPath(head, dir, count) {
    const cells = [];
    const d = DIR[dir];
    let x = head.x, y = head.y;
    for (let i = 0; i < count; i++) {
      x = wrap(x + d.x, state.gridWidth);
      y = wrap(y + d.y, state.gridHeight);
      cells.push({ x, y });
    }
    return cells;
  }

  function bfsReachability(start) {
    const visited = new Set();
    const queue = [start];
    visited.add(cellKey(start.x, start.y));
    const blocked = new Set();
    state.body.forEach(s => blocked.add(cellKey(s.x, s.y)));
    state.obstacles.forEach(o => blocked.add(cellKey(o.x, o.y)));

    let cheeseReachable = false;
    let emptyCount = 0;

    while (queue.length > 0) {
      const cell = queue.shift();
      if (state.cheese && cell.x === state.cheese.x && cell.y === state.cheese.y) {
        cheeseReachable = true;
      }
      if (!blocked.has(cellKey(cell.x, cell.y)) &&
          !(state.cheese && cell.x === state.cheese.x && cell.y === state.cheese.y)) {
        emptyCount++;
      }

      for (const d of Object.values(DIR)) {
        const nx = wrap(cell.x + d.x, state.gridWidth);
        const ny = wrap(cell.y + d.y, state.gridHeight);
        const key = cellKey(nx, ny);
        if (!visited.has(key) && !blocked.has(key)) {
          visited.add(key);
          queue.push({ x: nx, y: ny });
        }
      }
    }
    return { cheeseReachable, emptyCount };
  }

  function tryPlaceObstacle() {
    const head = state.body[0];
    const fwd = getForwardPath(head, state.effectiveDirection, OBS_FORWARD_PATH);
    const fwdSet = new Set(fwd.map(c => cellKey(c.x, c.y)));
    const occupied = getOccupiedSet();
    const empty = getEmptyCells(occupied);

    for (let attempt = 0; attempt < OBS_RETRIES; attempt++) {
      if (empty.length === 0) return false;
      const cell = randomItem(empty);
      if (chebyshevDist(cell, head) < OBS_SPAWN_DIST) continue;
      if (fwdSet.has(cellKey(cell.x, cell.y))) continue;

      // Tentatively place
      state.obstacles.push(cell);
      const result = bfsReachability(head);
      const totalEmpty = empty.length - 1; // minus the cell we just placed
      const minEmpty = Math.min(BFS_MIN_EMPTY, Math.floor(totalEmpty * BFS_MIN_RATIO));

      if (result.cheeseReachable && result.emptyCount >= minEmpty) {
        return true; // keep it
      }
      state.obstacles.pop(); // remove tentative
    }
    return false;
  }

  function gameOver() {
    clearTimeout(state.tickTimer);
    playSFX('gameover');
    // Brief freeze: render the collision frame without the overlay
    state.screen = 'freeze';
    render();
    // After 500ms, show the game-over overlay with particles
    setTimeout(() => {
      state.screen = 'gameover';
      spawnParticles(state.collisionCell.x, state.collisionCell.y, 12, COLORS.deathParticle, 'death');
      checkHighScore();
      render();
    }, 500);
  }

  function triggerWin() {
    clearTimeout(state.tickTimer);
    state.screen = 'win';
    checkHighScore();
    // Spawn particles after high score check so we know whether to enhance
    const count = state.isNewHighScore ? 50 : 25;
    spawnParticles(Math.floor(state.gridWidth / 2), Math.floor(state.gridHeight / 2), count, null, 'win');
    render();
  }

  function checkHighScore() {
    if (state.score > state.highScore) {
      state.highScore = state.score;
      state.isNewHighScore = true;
      saveHighScore(state.score);
    } else {
      state.isNewHighScore = false;
    }
  }

  function scheduleTick() {
    state.tickTimer = setTimeout(tick, state.tickInterval);
  }

  // ============================================================
  // 7. SPRITES
  // ============================================================
  function drawMouseHead(x, y, dir) {
    const cs = state.cellSize;
    const px = x * cs;
    const py = y * cs + HUD_HEIGHT;
    const simplified = cs < SIMPLIFIED_THRESHOLD;

    if (simplified) {
      // Simple circle with ear dots
      ctx.fillStyle = COLORS.mouseHead;
      ctx.beginPath();
      ctx.arc(px + cs / 2, py + cs / 2, cs / 2 - 1, 0, Math.PI * 2);
      ctx.fill();
      // Ears
      ctx.fillStyle = '#c0c0c0';
      const earR = cs / 6;
      ctx.beginPath();
      ctx.arc(px + cs * 0.3, py + cs * 0.2, earR, 0, Math.PI * 2);
      ctx.arc(px + cs * 0.7, py + cs * 0.2, earR, 0, Math.PI * 2);
      ctx.fill();
    } else {
      // Detailed head
      ctx.fillStyle = COLORS.mouseHead;
      ctx.beginPath();
      ctx.arc(px + cs / 2, py + cs / 2, cs / 2 - 2, 0, Math.PI * 2);
      ctx.fill();

      // Ears
      ctx.fillStyle = '#c0c0c0';
      const earR = cs / 4;
      let e1x, e1y, e2x, e2y;
      if (dir === 'UP') { e1x = 0.25; e1y = 0.15; e2x = 0.75; e2y = 0.15; }
      else if (dir === 'DOWN') { e1x = 0.25; e1y = 0.85; e2x = 0.75; e2y = 0.85; }
      else if (dir === 'LEFT') { e1x = 0.15; e1y = 0.25; e2x = 0.15; e2y = 0.75; }
      else { e1x = 0.85; e1y = 0.25; e2x = 0.85; e2y = 0.75; }
      ctx.beginPath();
      ctx.arc(px + cs * e1x, py + cs * e1y, earR, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(px + cs * e2x, py + cs * e2y, earR, 0, Math.PI * 2);
      ctx.fill();

      // Inner ears
      ctx.fillStyle = '#d4a0a0';
      ctx.beginPath();
      ctx.arc(px + cs * e1x, py + cs * e1y, earR * 0.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(px + cs * e2x, py + cs * e2y, earR * 0.5, 0, Math.PI * 2);
      ctx.fill();

      // Eyes
      ctx.fillStyle = '#1a1c2c';
      let ey1, ey2, ex1, ex2;
      if (dir === 'UP') { ex1 = 0.35; ey1 = 0.35; ex2 = 0.65; ey2 = 0.35; }
      else if (dir === 'DOWN') { ex1 = 0.35; ey1 = 0.65; ex2 = 0.65; ey2 = 0.65; }
      else if (dir === 'LEFT') { ex1 = 0.3; ey1 = 0.35; ex2 = 0.3; ey2 = 0.65; }
      else { ex1 = 0.7; ey1 = 0.35; ex2 = 0.7; ey2 = 0.65; }
      ctx.beginPath();
      ctx.arc(px + cs * ex1, py + cs * ey1, cs / 10, 0, Math.PI * 2);
      ctx.arc(px + cs * ex2, py + cs * ey2, cs / 10, 0, Math.PI * 2);
      ctx.fill();

      // Nose
      ctx.fillStyle = '#e0a0a0';
      let nx, ny;
      if (dir === 'UP') { nx = 0.5; ny = 0.25; }
      else if (dir === 'DOWN') { nx = 0.5; ny = 0.75; }
      else if (dir === 'LEFT') { nx = 0.2; ny = 0.5; }
      else { nx = 0.8; ny = 0.5; }
      ctx.beginPath();
      ctx.arc(px + cs * nx, py + cs * ny, cs / 12, 0, Math.PI * 2);
      ctx.fill();

      // Whiskers
      ctx.strokeStyle = '#d0d0d0';
      ctx.lineWidth = 1;
      if (dir === 'LEFT' || dir === 'RIGHT') {
        const wx = dir === 'LEFT' ? px + cs * 0.15 : px + cs * 0.85;
        const sign = dir === 'LEFT' ? -1 : 1;
        ctx.beginPath();
        ctx.moveTo(wx, py + cs * 0.4); ctx.lineTo(wx + sign * cs * 0.2, py + cs * 0.3);
        ctx.moveTo(wx, py + cs * 0.5); ctx.lineTo(wx + sign * cs * 0.2, py + cs * 0.5);
        ctx.moveTo(wx, py + cs * 0.6); ctx.lineTo(wx + sign * cs * 0.2, py + cs * 0.7);
        ctx.stroke();
      } else {
        const wy = dir === 'UP' ? py + cs * 0.2 : py + cs * 0.8;
        const sign = dir === 'UP' ? -1 : 1;
        ctx.beginPath();
        ctx.moveTo(px + cs * 0.3, wy); ctx.lineTo(px + cs * 0.2, wy + sign * cs * 0.15);
        ctx.moveTo(px + cs * 0.5, wy); ctx.lineTo(px + cs * 0.5, wy + sign * cs * 0.15);
        ctx.moveTo(px + cs * 0.7, wy); ctx.lineTo(px + cs * 0.8, wy + sign * cs * 0.15);
        ctx.stroke();
      }
    }
  }

  function drawMouseBody(x, y, index) {
    const cs = state.cellSize;
    const px = x * cs;
    const py = y * cs + HUD_HEIGHT;
    const brightness = Math.min(200, 160 + index * 3);
    ctx.fillStyle = `rgb(${brightness},${brightness},${brightness + 10})`;
    const inset = Math.max(1, cs / 10);
    ctx.beginPath();
    ctx.roundRect(px + inset, py + inset, cs - inset * 2, cs - inset * 2, cs / 5);
    ctx.fill();
  }

  function drawCheeseSprite(x, y) {
    const cs = state.cellSize;
    const px = x * cs;
    const py = y * cs + HUD_HEIGHT;

    ctx.fillStyle = COLORS.cheese;
    ctx.fillRect(px + 1, py + 1, cs - 2, cs - 2);

    if (cs >= SIMPLIFIED_THRESHOLD) {
      // Cheese holes
      ctx.fillStyle = COLORS.cheeseDark;
      ctx.beginPath();
      ctx.arc(px + cs * 0.3, py + cs * 0.4, cs / 8, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(px + cs * 0.65, py + cs * 0.6, cs / 10, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(px + cs * 0.5, py + cs * 0.75, cs / 12, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawObstacleSprite(x, y) {
    const cs = state.cellSize;
    const px = x * cs;
    const py = y * cs + HUD_HEIGHT;

    ctx.fillStyle = COLORS.obstacle;
    ctx.fillRect(px, py, cs, cs);

    if (cs >= SIMPLIFIED_THRESHOLD) {
      // Brick pattern
      ctx.strokeStyle = COLORS.obstacleDark;
      ctx.lineWidth = 1;
      ctx.beginPath();
      // Horizontal lines
      ctx.moveTo(px, py + cs / 3); ctx.lineTo(px + cs, py + cs / 3);
      ctx.moveTo(px, py + cs * 2 / 3); ctx.lineTo(px + cs, py + cs * 2 / 3);
      // Vertical lines (offset per row)
      ctx.moveTo(px + cs / 2, py); ctx.lineTo(px + cs / 2, py + cs / 3);
      ctx.moveTo(px + cs / 4, py + cs / 3); ctx.lineTo(px + cs / 4, py + cs * 2 / 3);
      ctx.moveTo(px + cs * 3 / 4, py + cs / 3); ctx.lineTo(px + cs * 3 / 4, py + cs * 2 / 3);
      ctx.moveTo(px + cs / 2, py + cs * 2 / 3); ctx.lineTo(px + cs / 2, py + cs);
      ctx.stroke();
    }
  }

  // ============================================================
  // 8. PARTICLES
  // ============================================================
  function spawnParticles(gx, gy, count, color, type) {
    const cs = state.cellSize;
    const cx = gx * cs + cs / 2;
    const cy = gy * cs + HUD_HEIGHT + cs / 2;
    for (let i = 0; i < count; i++) {
      const angle = (Math.PI * 2 / count) * i + Math.random() * 0.5;
      const speed = 1 + Math.random() * 3;
      let c = color;
      if (type === 'win') {
        const hue = Math.floor(Math.random() * 360);
        c = `hsl(${hue}, 80%, 60%)`;
      }
      state.particles.push({
        x: cx, y: cy,
        vx: Math.cos(angle) * speed * (type === 'win' ? 0.5 : 1),
        vy: Math.sin(angle) * speed * (type === 'win' ? -2 : 1) + (type === 'win' ? -3 : 0),
        life: 1, decay: 0.01 + Math.random() * 0.02,
        color: c, size: 2 + Math.random() * 3
      });
    }
  }

  function updateParticles() {
    for (let i = state.particles.length - 1; i >= 0; i--) {
      const p = state.particles[i];
      p.x += p.vx;
      p.y += p.vy;
      if (p.vy < 5) p.vy += 0.1; // gravity
      p.life -= p.decay;
      if (p.life <= 0) state.particles.splice(i, 1);
    }
  }

  function drawParticles() {
    state.particles.forEach(p => {
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
    });
    ctx.globalAlpha = 1;
  }

  // ============================================================
  // 9. AUDIO
  // ============================================================
  function initAudio() {
    if (state.audioInitialized) {
      if (state.audioCtx && state.audioCtx.state === 'suspended') {
        state.audioCtx.resume();
      }
      return;
    }
    try {
      state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      state.audioInitialized = true;
    } catch (e) { /* audio not available */ }
  }

  function playSFX(type) {
    if (!state.audioCtx || state.pauseMuted || state.resizeMuted) return;
    try {
      const ctx = state.audioCtx;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);

      switch (type) {
        case 'eat':
          osc.type = 'sine';
          osc.frequency.setValueAtTime(200, ctx.currentTime);
          osc.frequency.linearRampToValueAtTime(600, ctx.currentTime + 0.1);
          gain.gain.setValueAtTime(0.3, ctx.currentTime);
          gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.1);
          osc.start(); osc.stop(ctx.currentTime + 0.1);
          break;
        case 'gameover':
          osc.type = 'square';
          osc.frequency.setValueAtTime(400, ctx.currentTime);
          osc.frequency.linearRampToValueAtTime(100, ctx.currentTime + 0.3);
          gain.gain.setValueAtTime(0.3, ctx.currentTime);
          gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.3);
          osc.start(); osc.stop(ctx.currentTime + 0.3);
          break;
        case 'obstacle':
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(80, ctx.currentTime);
          gain.gain.setValueAtTime(0.4, ctx.currentTime);
          gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.15);
          osc.start(); osc.stop(ctx.currentTime + 0.15);
          break;
        case 'menu':
          osc.type = 'sine';
          osc.frequency.setValueAtTime(800, ctx.currentTime);
          gain.gain.setValueAtTime(0.2, ctx.currentTime);
          gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.05);
          osc.start(); osc.stop(ctx.currentTime + 0.05);
          break;
      }
    } catch (e) { /* ignore audio errors */ }
  }

  // Background music — simple chiptune loop
  const MELODY = [
    262, 330, 392, 523, 392, 330, 262, 330,
    294, 349, 440, 523, 440, 349, 294, 349,
    330, 392, 494, 587, 494, 392, 330, 392,
    262, 330, 392, 523, 494, 440, 392, 330
  ];
  const BASS = [
    131, 131, 165, 165, 147, 147, 175, 175,
    131, 131, 165, 165, 147, 147, 175, 175,
    131, 131, 165, 165, 147, 147, 175, 175,
    131, 131, 165, 165, 147, 147, 131, 131
  ];
  const NOTE_DUR = 0.125; // 120 BPM, 16th notes

  function startMusic() {
    if (!state.audioCtx || !state.musicEnabled || state.musicPlaying) return;
    state.musicPlaying = true;
    scheduleMusic();
  }

  function scheduleMusic() {
    if (!state.musicPlaying || !state.audioCtx) return;
    const ac = state.audioCtx;
    const now = ac.currentTime;
    const loopDur = MELODY.length * NOTE_DUR;

    // Melody
    for (let i = 0; i < MELODY.length; i++) {
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.type = 'square';
      osc.frequency.setValueAtTime(MELODY[i], now + i * NOTE_DUR);
      gain.gain.setValueAtTime(0.08, now + i * NOTE_DUR);
      gain.gain.setValueAtTime(0, now + (i + 0.9) * NOTE_DUR);
      osc.connect(gain);
      gain.connect(ac.destination);
      osc.start(now + i * NOTE_DUR);
      osc.stop(now + (i + 1) * NOTE_DUR);
    }

    // Bass
    for (let i = 0; i < BASS.length; i++) {
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(BASS[i], now + i * NOTE_DUR);
      gain.gain.setValueAtTime(0.06, now + i * NOTE_DUR);
      gain.gain.setValueAtTime(0, now + (i + 0.9) * NOTE_DUR);
      osc.connect(gain);
      gain.connect(ac.destination);
      osc.start(now + i * NOTE_DUR);
      osc.stop(now + (i + 1) * NOTE_DUR);
    }

    // Schedule next loop
    state.musicNodes = setTimeout(() => {
      if (state.musicPlaying) scheduleMusic();
    }, loopDur * 1000 - 50);
  }

  function stopMusic() {
    state.musicPlaying = false;
    if (state.musicNodes) {
      clearTimeout(state.musicNodes);
      state.musicNodes = null;
    }
  }

  // ============================================================
  // 10. RENDERING
  // ============================================================
  function render() {
    // Clear
    ctx.fillStyle = COLORS.bg;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Grid lines
    ctx.strokeStyle = COLORS.grid;
    ctx.lineWidth = 0.5;
    for (let x = 0; x <= state.gridWidth; x++) {
      ctx.beginPath();
      ctx.moveTo(x * state.cellSize, HUD_HEIGHT);
      ctx.lineTo(x * state.cellSize, canvas.height);
      ctx.stroke();
    }
    for (let y = 0; y <= state.gridHeight; y++) {
      ctx.beginPath();
      ctx.moveTo(0, y * state.cellSize + HUD_HEIGHT);
      ctx.lineTo(canvas.width, y * state.cellSize + HUD_HEIGHT);
      ctx.stroke();
    }

    // Obstacles
    state.obstacles.forEach(o => drawObstacleSprite(o.x, o.y));

    // Cheese
    if (state.cheese) drawCheeseSprite(state.cheese.x, state.cheese.y);

    // Mouse body (back to front)
    for (let i = state.body.length - 1; i >= 1; i--) {
      drawMouseBody(state.body[i].x, state.body[i].y, i);
    }
    // Mouse head
    if (state.body.length > 0) {
      drawMouseHead(state.body[0].x, state.body[0].y, state.effectiveDirection);
    }

    // Collision highlight
    if (state.collisionCell && (state.screen === 'gameover' || state.screen === 'freeze')) {
      const cs = state.cellSize;
      ctx.strokeStyle = '#ff0000';
      ctx.lineWidth = 2;
      ctx.strokeRect(
        state.collisionCell.x * cs + 1,
        state.collisionCell.y * cs + HUD_HEIGHT + 1,
        cs - 2, cs - 2
      );
    }

    // Particles
    drawParticles();

    // HUD
    drawHUD();

    // Screen overlays
    switch (state.screen) {
      case 'start': drawStartScreen(); break;
      case 'paused': drawPauseScreen(); break;
      case 'gameover': drawGameOverScreen(); break;
      case 'win': drawWinScreen(); break;
      case 'tooSmall': drawTooSmallScreen(); break;
    }

    if (state.resizeBlocked) drawResizeBlockScreen();
  }

  function drawHUD() {
    // Background
    ctx.fillStyle = COLORS.hud;
    ctx.fillRect(0, 0, canvas.width, HUD_HEIGHT);

    ctx.font = '16px monospace';
    const y1 = 18, y2 = 36;

    // Line 1: Score and Speed
    // Cheese icon
    ctx.fillStyle = COLORS.cheese;
    ctx.fillRect(8, y1 - 8, 10, 10);
    ctx.fillStyle = COLORS.text;
    ctx.textAlign = 'left';
    ctx.fillText('Score: ', 22, y1);
    ctx.fillStyle = COLORS.gold;
    ctx.fillText(state.score, 22 + ctx.measureText('Score: ').width, y1);

    // Speed
    ctx.fillStyle = COLORS.gold;
    ctx.fillRect(canvas.width - 120, y1 - 8, 3, 10); // bolt
    ctx.fillRect(canvas.width - 118, y1 - 5, 6, 3);
    ctx.fillStyle = COLORS.text;
    ctx.fillText('Spd: ' + state.speedLevel, canvas.width - 108, y1);

    // Line 2: High score and music
    // Trophy icon
    ctx.fillStyle = COLORS.gold;
    ctx.fillRect(8, y2 - 8, 10, 10);
    ctx.fillStyle = COLORS.text;
    ctx.fillText('High: ' + state.highScore, 22, y2);

    // Music indicator
    ctx.fillStyle = state.musicEnabled ? COLORS.gold : '#555';
    ctx.font = '12px monospace';
    ctx.textAlign = 'right';
    ctx.fillText(state.musicEnabled ? '[M] ON' : '[M] OFF', canvas.width - 8, y2);
    ctx.textAlign = 'left';
    ctx.font = '16px monospace';
  }

  // ============================================================
  // 11. SCREENS
  // ============================================================
  function drawOverlay() {
    ctx.fillStyle = COLORS.overlay;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  function drawStartScreen() {
    drawOverlay();
    const cx = canvas.width / 2;
    const cy = canvas.height / 2;

    ctx.textAlign = 'center';
    ctx.fillStyle = COLORS.gold;
    ctx.font = 'bold 48px monospace';
    ctx.fillText('MOUSE', cx, cy - 80);

    ctx.fillStyle = COLORS.text;
    ctx.font = '14px monospace';
    ctx.fillText('Arrow Keys / WASD to move', cx, cy - 20);
    ctx.fillText('P to pause', cx, cy + 5);
    ctx.fillText('M to toggle music', cx, cy + 30);

    if (state.blinkVisible) {
      ctx.fillStyle = COLORS.gold;
      ctx.font = '18px monospace';
      ctx.fillText('Press SPACE to Start', cx, cy + 75);
    }

    ctx.textAlign = 'left';
  }

  function drawPauseScreen() {
    drawOverlay();
    const cx = canvas.width / 2;
    const cy = canvas.height / 2;

    ctx.textAlign = 'center';
    ctx.fillStyle = COLORS.text;
    ctx.font = 'bold 36px monospace';
    ctx.fillText('PAUSED', cx, cy - 10);

    ctx.font = '14px monospace';
    ctx.fillStyle = '#aaa';
    ctx.fillText('P to resume \u00b7 M to toggle music', cx, cy + 30);
    ctx.textAlign = 'left';
  }

  function drawGameOverScreen() {
    drawOverlay();
    const cx = canvas.width / 2;
    const cy = canvas.height / 2;

    ctx.textAlign = 'center';
    ctx.fillStyle = '#ff4444';
    ctx.font = 'bold 36px monospace';
    ctx.fillText('GAME OVER', cx, cy - 40);

    ctx.fillStyle = COLORS.text;
    ctx.font = '16px monospace';
    ctx.fillText('Score: ' + state.score, cx, cy + 5);
    ctx.fillText('High: ' + state.highScore, cx, cy + 30);

    if (state.isNewHighScore) {
      ctx.fillStyle = COLORS.gold;
      ctx.font = 'bold 18px monospace';
      ctx.fillText('NEW HIGH SCORE!', cx, cy + 60);
    }

    ctx.fillStyle = '#aaa';
    ctx.font = '14px monospace';
    ctx.fillText('SPACE to restart \u00b7 M to toggle music', cx, cy + 90);
    ctx.textAlign = 'left';
  }

  function drawWinScreen() {
    drawOverlay();
    const cx = canvas.width / 2;
    const cy = canvas.height / 2;

    ctx.textAlign = 'center';
    ctx.fillStyle = COLORS.gold;
    ctx.font = 'bold 36px monospace';
    ctx.fillText('YOU WIN!', cx, cy - 40);

    ctx.fillStyle = COLORS.text;
    ctx.font = '16px monospace';
    ctx.fillText('Score: ' + state.score, cx, cy + 5);
    ctx.fillText('High: ' + state.highScore, cx, cy + 30);

    if (state.isNewHighScore) {
      ctx.fillStyle = COLORS.gold;
      ctx.font = 'bold 18px monospace';
      ctx.fillText('NEW HIGH SCORE!', cx, cy + 60);
    }

    ctx.fillStyle = '#aaa';
    ctx.font = '14px monospace';
    ctx.fillText('SPACE to restart \u00b7 M to toggle music', cx, cy + 90);
    ctx.textAlign = 'left';
  }

  function drawTooSmallScreen() {
    ctx.fillStyle = COLORS.bg;
    ctx.fillRect(0, 0, canvas.width || window.innerWidth, canvas.height || window.innerHeight);
    ctx.textAlign = 'center';
    ctx.fillStyle = COLORS.text;
    ctx.font = '16px monospace';
    ctx.fillText('Screen too small', (canvas.width || window.innerWidth) / 2, (canvas.height || window.innerHeight) / 2);
    ctx.textAlign = 'left';
  }

  function drawResizeBlockScreen() {
    drawOverlay();
    const cx = canvas.width / 2;
    const cy = canvas.height / 2;
    ctx.textAlign = 'center';
    ctx.fillStyle = COLORS.text;
    ctx.font = '16px monospace';
    if (window.innerWidth < 150 || window.innerHeight < 190) {
      ctx.fillText('Screen too small', cx, cy);
    } else {
      ctx.fillText('Window too small', cx, cy - 10);
      ctx.fillText('Resize to continue', cx, cy + 15);
    }
    ctx.textAlign = 'left';
  }

  // ============================================================
  // 12. INIT
  // ============================================================
  function loadHighScore() {
    return parseInt(localStorage.getItem('mouseGameHighScore')) || 0;
  }

  function saveHighScore(score) {
    localStorage.setItem('mouseGameHighScore', score);
  }

  // Blink timer for start screen
  setInterval(() => {
    state.blinkVisible = !state.blinkVisible;
    if (state.screen === 'start') render();
  }, 500);

  // Render + particle loop
  function renderLoop() {
    if (state.particles.length > 0) {
      updateParticles();
      render();
    }
    requestAnimationFrame(renderLoop);
  }

  // Boot
  state.highScore = loadHighScore();
  if (computeGrid()) {
    setupCanvas();
  } else {
    // tooSmall fallback
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  render();
  requestAnimationFrame(renderLoop);

  </script>
</body>
</html>
